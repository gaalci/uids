name: Build Name-UID Index

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Extract names & write JSON indexes
        run: python scripts/extract_names.py

      - name: Commit index files
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: chore: update Name-UID JSON indexes
          file_pattern: indexes/*.json
